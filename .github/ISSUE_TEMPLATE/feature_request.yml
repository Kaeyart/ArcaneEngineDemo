name: Feature request
description: Propose a scoped product or technical improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the player or development problem.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe behavior and acceptance criteria, not only implementation.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: System
      options:
        - SpellForge
        - Reactions
        - Maps and Atlas
        - Items and crafting
        - Classes and Ascendancies
        - Constellations
        - Persistence
        - UI and presentation
        - Tooling and repository
        - Other
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and compatibility
      description: Include save migration, performance, balance, and content dependencies.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
