name: Unity CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
      - "release/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: unity-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UNITY_VERSION: 6000.5.2f1

jobs:
  project-audit:
    name: Project audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate repository
        run: python3 tools/repo_hygiene.py --project .

  test:
    name: Unity tests (Linux)
    if: ${{ vars.ENABLE_UNITY_CI == 'true' }}
    needs: project-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library/
          key: library-linux-${{ env.UNITY_VERSION }}-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/**') }}
          restore-keys: |
            library-linux-${{ env.UNITY_VERSION }}-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: editmode
          artifactsPath: artifacts/editmode

      - name: Run PlayMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: playmode
          artifactsPath: artifacts/playmode

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: artifacts/
          retention-days: 14

  build:
    name: Linux standalone build
    if: ${{ vars.ENABLE_UNITY_CI == 'true' }}
    needs:
      - project-audit
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library/
          key: library-linux-${{ env.UNITY_VERSION }}-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/**') }}
          restore-keys: |
            library-linux-${{ env.UNITY_VERSION }}-

      - name: Build Linux Standalone
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneLinux64
          buildName: ArcaneEngineDemo
          buildsPath: builds

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: ArcaneEngineDemo-Linux
          path: builds/
          retention-days: 14
