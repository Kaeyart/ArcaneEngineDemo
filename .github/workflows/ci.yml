name: Arcane Engine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unity Tests (Linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        unity-version: ['6000.0.38f1']

    steps:
      - uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library/
          key: library-linux-${{ matrix.unity-version }}-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/**') }}
          restore-keys: library-linux-${{ matrix.unity-version }}-

      - name: Run EditMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ matrix.unity-version }}
          testMode: editmode
          artifactsPath: artifacts/editmode

      - name: Run PlayMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ matrix.unity-version }}
          testMode: playmode
          artifactsPath: artifacts/playmode

  build:
    name: Build (Linux Standalone)
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        unity-version: ['6000.0.38f1']

    steps:
      - uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library/
          key: library-linux-${{ matrix.unity-version }}-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/**') }}
          restore-keys: library-linux-${{ matrix.unity-version }}-

      - name: Build Linux Standalone
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ matrix.unity-version }}
          targetPlatform: StandaloneLinux64
          buildName: ArcaneEngineDemo
          buildsPath: builds

      - uses: actions/upload-artifact@v4
        with:
          name: ArcaneEngineDemo-Linux
          path: builds/
          retention-days: 7